name: Job Scanner

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:         # Manual trigger button in GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create config.yaml from secret
        run: echo "$CONFIG_YAML" > config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run job scanner
        run: python main.py
        env:
          DISCORD_WEBHOOK_SOFTWARE_ENGINEERING: ${{ secrets.DISCORD_WEBHOOK_SOFTWARE_ENGINEERING }}
          DISCORD_WEBHOOK_FRONTEND: ${{ secrets.DISCORD_WEBHOOK_FRONTEND }}
          DISCORD_WEBHOOK_MOBILE: ${{ secrets.DISCORD_WEBHOOK_MOBILE }}
          DISCORD_WEBHOOK_DATA_SCIENCE_ML: ${{ secrets.DISCORD_WEBHOOK_DATA_SCIENCE_ML }}
          DISCORD_WEBHOOK_QA: ${{ secrets.DISCORD_WEBHOOK_QA }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state.json [skip ci]"
          git push
